<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>The Last Track</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800&display=swap');

:root {
  --navy: #1A3C5E;
  --gold: #9B7B2C;
  --black: #141414;
  --grey: #6B6B6B;
  --white: #F5F5F0;
  --bg-gradient: radial-gradient(circle at center, #2c2c2c 0%, #141414 100%);
}

body, html { 
    margin: 0; padding: 0; width: 100%; height: 100%; 
    background: var(--black); color: var(--white); 
    font-family: 'Inter', sans-serif; 
    overflow: hidden; touch-action: none; 
    display: flex; justify-content: center; align-items: center; 
}
#gameContainer { 
    position: relative; width: 100%; height: 100%; 
    max-width: 1280px; max-height: 720px; 
    background: var(--black); overflow: hidden; 
}
canvas { 
    display: block; width: 100%; height: 100%; 
    text-rendering: optimizeLegibility; 
    transition: filter 1s ease; 
}

/* OVERLAYS */
.overlay { 
    position: absolute; inset: 0; 
    display: flex; flex-direction: column; align-items: center; justify-content: center; 
    background: var(--black); z-index: 100;
    transition: opacity 0.5s ease; 
    background-image: var(--bg-gradient);
}
.overlay.transparent { background: rgba(20,20,20,0.85); }
.hidden { opacity: 0; pointer-events: none !important; }

h1 { 
    color: var(--white); font-size: 3.5rem; margin-bottom: 0.5rem; 
    text-transform: uppercase; text-align: center; font-weight: 300; 
    letter-spacing: 0.3em; opacity: 0.9; line-height: 1.2;
}
h2 { 
    color: var(--gold); margin-top: 0; font-weight: 600; 
    font-size: 1.5rem; text-align: center; letter-spacing: 0.1em; text-transform: uppercase;
}
p { font-size: 1.1rem; color: var(--grey); text-align: center; margin-top: 10px; }

/* GRAIN OVERLAY */
.grain-overlay {
    position: absolute; inset: 0; pointer-events: none; opacity: 0.03; mix-blend-mode: overlay; 
    background-image: url('data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciPjxmaWx0ZXIgaWQ9Im5vaXNlRmlsdGVyIiB4PSIwIiB5PSIwIiB3aWR0aD0iMTAwJSIgaGVpZ2h0PSIxMDAlIj48ZmVUdXJidWxlbmNlIHR5cGU9ImZyYWN0YWxOb2lzZSIgYmFzZUZyZXF1ZW5jeT0iMC44IiBudW1PY3RhdmVzPSIzIiBzdGl0Y2hUaWxlcz0ic3RpdGNoIi8+PC9maWx0ZXI+PHJlY3Qgd2lkdGg9IjEwMCUiIGhlaWdodD0iMTAwJSIgZmlsdGVyPSJ1cmwoI25vaXNlRmlsdGVyKSIvPjwvc3ZnPg==');
    z-index: 99;
}

/* BUTTONS */
button { 
    padding: 15px 40px; font-size: 1rem; 
    background: var(--black); color: var(--white); 
    border: 1px solid rgba(245, 245, 240, 0.3); border-radius: 4px; 
    cursor: pointer; transition: all 0.3s ease; 
    margin-top: 2rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.2em;
}
button:hover { 
    border-color: var(--gold); color: var(--gold); 
    background: rgba(155, 123, 44, 0.1);
    box-shadow: 0 0 15px rgba(155, 123, 44, 0.4); 
}

/* HUD LAYOUT */
#hud { 
    position: absolute; top: 0; left: 0; width: 100%; 
    pointer-events: none; padding: 2rem 3rem; box-sizing: border-box; 
    display: flex; justify-content: space-between; z-index: 50; 
    align-items: flex-start;
}
.hud-col { display: flex; flex-direction: column; gap: 8px; pointer-events: auto; }
.hud-label { font-size: 10px; text-transform: uppercase; letter-spacing: 0.2em; color: var(--grey); font-weight: 600; }
.hud-title-container { text-align: center; }
.hud-title-container h1 { font-size: 2.25rem; font-weight: 300; letter-spacing: 0.3em; margin: 0; opacity: 0.9; line-height: 1.2; }

#levelHUD { color: var(--gold); font-size: 0.75rem; margin-top: 0.25rem; text-transform: uppercase; letter-spacing: 0.1em; font-weight: 700; }
#fragmentsHUD { font-size: 1.875rem; font-weight: 700; color: var(--white); margin: 0; margin-top: 4px; }
.frags-container { display: flex; align-items: center; justify-content: flex-end; gap: 8px; }
.frag-glow { width: 24px; height: 24px; background: var(--gold); border-radius: 50%; filter: blur(2px); animation: pulseAnim 2s infinite; }

/* CASSETTES */
#livesHUD { display: flex; gap: 8px; }
.cassette { 
    width: 36px; height: 24px; background: var(--white); 
    border-radius: 2px; position: relative; 
    display: flex; align-items: center; justify-content: center;
}
.cassette::before { 
    content: ''; position: absolute; left: 6px;
    width: 6px; height: 6px; background: var(--black); border-radius: 50%;
}
.cassette::after { 
    content: ''; position: absolute; right: 6px;
    width: 6px; height: 6px; background: var(--black); border-radius: 50%; 
}
.cassette .tape-line {
    position: absolute; bottom: 2px; height: 1px; width: 24px; background: rgba(20,20,20,0.2);
}
.cassette.lost { opacity: 0.2; }

/* FREQUENCY METER */
#freqMeterContainer {
    position: absolute; bottom: 0; left: 0; width: 100%; padding: 3rem;
    box-sizing: border-box; display: flex; flex-direction: column; z-index: 50;
    pointer-events: none;
}
.freq-header { display: flex; justify-content: space-between; align-items: flex-end; margin-bottom: 0.75rem; width: 100%; }
.freq-label { font-size: 10px; text-transform: uppercase; letter-spacing: 0.3em; font-weight: 700; color: var(--white); }
.freq-percent { font-size: 0.75rem; color: var(--gold); font-style: italic; }

#freqMeter { 
    width: 100%; height: 16px; background: rgba(255,255,255,0.05); 
    border: 1px solid rgba(255,255,255,0.1); border-radius: 16px; overflow: hidden; padding: 2px;
    box-sizing: border-box; pointer-events: auto;
}
#freqFill { 
    height: 100%; width: 0%; border-radius: 16px;
    background: linear-gradient(to right, var(--navy), var(--gold)); 
    transition: width 1s ease; position: relative; display: flex; justify-content: flex-end; align-items: center;
}
.freq-inner-dot {
    width: 4px; height: 8px; border-radius: 4px; background: rgba(255,255,255,0.5); margin-right: 4px;
}

/* TOUCH CONTROLS */
#touchControls { position: absolute; bottom: 30px; left: 0; right: 0; display: flex; justify-content: space-between; padding: 0 30px; z-index: 60; }
.touch-btn { 
    width: 60px; height: 60px; 
    background: transparent; border-radius: 12px; 
    border: 1px solid rgba(245, 245, 240, 0.4); color: rgba(245,245,240,0.6);
    display: flex; align-items: center; justify-content: center; 
    font-size: 24px; font-weight: 300; user-select: none; transition: all 0.1s;
}
.touch-btn:active { background: rgba(155, 123, 44, 0.2); border-color: var(--gold); color: var(--gold); }
#touchControls.hidden { display: none !important; }
.left-right { display: flex; gap: 10px; }

.pulse { animation: pulseHit 0.8s; }
@keyframes pulseHit { 
    0% { transform: scale(1); box-shadow: 0 0 0 transparent; } 
    50% { transform: scale(1.02); box-shadow: 0 0 20px var(--gold); } 
    100% { transform: scale(1); } 
}
@keyframes pulseAnim {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.5; transform: scale(0.9); }
}

/* Finale Specific Graphics */
#portrait { 
    width: 160px; height: 220px; border: 4px solid var(--gold); 
    margin: 0 auto 30px auto; display: flex; align-items: center; justify-content: center; 
    box-shadow: 0 0 40px rgba(155, 123, 44, 0.6); background: #222; border-radius: 4px;
    animation: portraitPulse 3s infinite alternate;
}
@keyframes portraitPulse { 0% { box-shadow: 0 0 20px rgba(155, 123, 44, 0.4); } 100% { box-shadow: 0 0 50px rgba(155, 123, 44, 0.8); } }
.guitar { 
    width: 50px; height: 120px; border-radius: 25px 25px 40px 40px; 
    background: var(--gold); position: relative; 
}
.guitar::before {
    content: ''; position: absolute; top:-40px; left: 20px; width: 10px; height: 50px; background: var(--gold);
}
</style>
</head>
<body>
<div id="gameContainer">
    <canvas id="gameCanvas" width="1280" height="720"></canvas>
    
    <div class="grain-overlay"></div>
    
    <div id="hud" class="hidden">
        <div class="hud-col">
            <div class="hud-label">Lives</div>
            <div id="livesHUD"></div>
        </div>
        <div class="hud-title-container">
            <h1>The Last Track</h1>
            <div id="levelHUD"></div>
        </div>
        <div class="hud-col" style="align-items: flex-end;">
            <div class="hud-label">Melody Fragments</div>
            <div class="frags-container">
                <div id="fragmentsHUD">1 <span style="opacity:0.3; font-size:1.25rem; font-weight:400;">/</span> 5</div>
                <div class="frag-glow hidden" id="fragGlow"></div>
            </div>
        </div>
    </div>
    
    <div id="freqMeterContainer" class="hidden">
        <div class="freq-header">
            <div class="freq-label">Frequency Progress</div>
            <div class="freq-percent" id="freqPercent">20% Resonated</div>
        </div>
        <div id="freqMeter"><div id="freqFill"><div class="freq-inner-dot"></div></div></div>
    </div>

    <!-- Start Screen -->
    <div id="startScreen" class="overlay">
        <h1>The Last Track</h1>
        <h2>Find the five melody fragments.</h2>
        <p>Help Maya finish her grandfather's song.</p>
        <button onclick="startGame()">Play</button>
    </div>

    <!-- Message Screen -->
    <div id="messageScreen" class="overlay transparent hidden">
        <h1 id="msgTitle">Level Complete</h1>
        <h2 id="msgSubtitle"></h2>
        <button id="msgBtn" onclick="nextAction()">Continue</button>
    </div>
    
    <!-- Finale Screen -->
    <div id="finaleScreen" class="overlay hidden">
        <div id="portrait"><div class="guitar"></div></div>
        <h2 id="finText1" style="opacity:0; transition: opacity 2s;">The song is complete.</h2>
        <h2 id="finText2" style="opacity:0; transition: opacity 2s 2s;">Some things deserve to be finished.</h2>
        <p id="finText3" style="opacity:0; transition: opacity 2s 4s; margin-top:20px; font-style:italic;">— Maya & Tok Ali</p>
        <div style="display:flex; gap: 20px; margin-top: 10px;">
           <button id="replayBtn" style="opacity:0; transition: opacity 2s 6s;" onclick="location.reload()">Replay</button>
        </div>
    </div>

    <!-- Mobile Controls -->
    <div id="touchControls" class="hidden">
        <div class="left-right">
            <div class="touch-btn" id="btnLeft" onpointerdown="keys.left=true; event.preventDefault();" onpointerup="keys.left=false" onpointerleave="keys.left=false" style="font-size: 1.5rem;">←</div>
            <div class="touch-btn" id="btnRight" onpointerdown="keys.right=true; event.preventDefault();" onpointerup="keys.right=false" onpointerleave="keys.right=false" style="font-size: 1.5rem;">→</div>
        </div>
        <div class="touch-btn" id="btnJump" onpointerdown="keys.up=true; event.preventDefault();" onpointerup="keys.up=false" onpointerleave="keys.up=false" style="width: 100px; font-size: 0.9rem; letter-spacing: 2px; font-weight: 600;">JUMP</div>
    </div>
</div>

<script>
/**
 * THE LAST TRACK
 * Single File HTML Game Architecture
 */

// --- Game Engine Setup ---
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');

const WORLDS = [
  { id: 0, name: "The Family Home", text: "He practiced here every evening after dinner.", bg: "#2E241E", obst: 'falling_books', audio: [261.63, 329.63, 392.00] },
  { id: 1, name: "The Garden", text: "This was his favourite place to play.", bg: "#0F1A15", obst: 'wind_vines', audio: [293.66, 349.23, 440.00, 523.25] },
  { id: 2, name: "The Cassette Shop", text: "He recorded one tape. Never released it.", bg: "#362B1D", obst: 'rolling_tapes', audio: [329.63, 392.00, 493.88, 587.33, 659.25] },
  { id: 3, name: "The Studio Street", text: "He stood here once. Never went in.", bg: "#0D1121", obst: 'splash_doors', audio: [349.23, 440.00, 523.25, 659.25, 698.46, 880.00] },
  { id: 4, name: "The Memorial Room", text: "She finished what he started.", bg: "#2B161A", obst: 'candles_garlands', audio: [392.00, 493.88, 587.33, 698.46, 783.99, 987.77, 1567.98] } /* Longer sustain on final handled in playback */
];

const MAP_NODES = [
  {x: 200, y: 360, name: "The Family Home"}, 
  {x: 400, y: 200, name: "The Garden"}, 
  {x: 650, y: 550, name: "The Cassette Shop"}, 
  {x: 900, y: 250, name: "The Studio Street"}, 
  {x: 1100, y: 400, name: "The Memorial Room"}
];

let state = 'START'; // START, MAP, LEVEL, DEAD, WIN
let currentWorld = 0;
let unlockedWorlds = 0;
let lives = 3;

// --- Input Handling ---
const keys = { left: false, right: false, up: false };
let upHeld = false;
window.addEventListener('keydown', e => {
  if (e.code === 'ArrowLeft' || e.key === 'a') keys.left = true;
  if (e.code === 'ArrowRight' || e.key === 'd') keys.right = true;
  if ((e.code === 'ArrowUp' || e.code === 'Space' || e.key === 'w') && !upHeld) { keys.up = true; upHeld = true; }
});
window.addEventListener('keyup', e => {
  if (e.code === 'ArrowLeft' || e.key === 'a') keys.left = false;
  if (e.code === 'ArrowRight' || e.key === 'd') keys.right = false;
  if (e.code === 'ArrowUp' || e.code === 'Space' || e.key === 'w') upHeld = false;
});

// Enable touch controls on touch devices
if ('ontouchstart' in window || navigator.maxTouchPoints > 0) {
    document.getElementById('touchControls').classList.remove('hidden');
}

// Map screen interaction
canvas.addEventListener('click', e => {
  if (state !== 'MAP') return;
  const rect = canvas.getBoundingClientRect();
  const scaleX = canvas.width / rect.width;
  const scaleY = canvas.height / rect.height;
  const mx = (e.clientX - rect.left) * scaleX;
  const my = (e.clientY - rect.top) * scaleY;
  
  for(let i=0; i<=unlockedWorlds && i<5; i++) {
    const n = MAP_NODES[i];
    if (Math.hypot(mx - n.x, my - n.y) < 50) {
      currentWorld = i;
      enterLevel(i);
      break;
    }
  }
});

// --- Web Audio API Integration ---
const AudioContextClass = window.AudioContext || window.webkitAudioContext;
let audioCtx;

function initAudio() { 
    if(!audioCtx) audioCtx = new AudioContextClass(); 
    if(audioCtx.state === 'suspended') audioCtx.resume(); 
}

function playTone(freq, duration=0.5) {
  initAudio();
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  
  osc.type = 'sine'; // Soft acoustic feel
  osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
  
  // Enveloping
  gain.gain.setValueAtTime(0, audioCtx.currentTime);
  gain.gain.linearRampToValueAtTime(0.15, audioCtx.currentTime + 0.05);
  gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + duration);
  
  osc.connect(gain); 
  gain.connect(audioCtx.destination);
  
  osc.start(); 
  osc.stop(audioCtx.currentTime + duration);
}

function playHit() { 
    initAudio(); 
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.type = 'sawtooth';
    osc.frequency.setValueAtTime(120, audioCtx.currentTime);
    osc.frequency.exponentialRampToValueAtTime(40, audioCtx.currentTime + 0.2);
    gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
    gain.gain.linearRampToValueAtTime(0, audioCtx.currentTime + 0.2);
    osc.connect(gain); gain.connect(audioCtx.destination);
    osc.start(); osc.stop(audioCtx.currentTime + 0.2);
}

// --- UI Management ---
const els = {
  start: document.getElementById('startScreen'), 
  msg: document.getElementById('messageScreen'),
  hud: document.getElementById('hud'), 
  freqContainer: document.getElementById('freqMeterContainer'),
  lives: document.getElementById('livesHUD'), 
  level: document.getElementById('levelHUD'),
  frags: document.getElementById('fragmentsHUD'), 
  freqFill: document.getElementById('freqFill'),
  freqMeter: document.getElementById('freqMeter'),
  finale: document.getElementById('finaleScreen')
};

function updateHUD() {
  els.lives.innerHTML = '';
  for(let i=0; i<3; i++) els.lives.innerHTML += `<div class="cassette ${i >= lives ? 'lost':''}"><div class="tape-line"></div></div>`;
  
  els.level.innerText = state==='LEVEL' ? `World ${currentWorld+1} — ${WORLDS[currentWorld].name}` : "Overworld Map";
  els.frags.innerHTML = `${unlockedWorlds} <span style="opacity:0.3; font-size:1.25rem; font-weight:400;">/</span> 5`;
  
  let pct = unlockedWorlds * 20;
  els.freqFill.style.width = pct + '%';
  let freqPctEl = document.getElementById('freqPercent');
  if(freqPctEl) freqPctEl.innerText = `${pct}% Resonated`;
  
  let glow = document.getElementById('fragGlow');
  if(glow) {
      if (unlockedWorlds > 0 && state === 'MAP') glow.classList.remove('hidden');
      else glow.classList.add('hidden');
  }
}

function startGame() { 
    initAudio(); 
    els.start.classList.add('hidden'); 
    enterMap(); 
}

function enterMap() {
  state = 'MAP';
  updateHUD();
  keys.left = false; keys.right = false; keys.up = false;
  els.hud.classList.remove('hidden');
  els.freqContainer.classList.remove('hidden');
  els.msg.classList.add('hidden');
  
  // Transition map sepia filter incrementally based on progress
  let sepiaVal = 100 - (unlockedWorlds * 20);
  canvas.style.filter = `sepia(${sepiaVal}%)`;
}

// --- Platformer Physics & Logic ---
class Rect {
  constructor(x,y,w,h) { this.x=x;this.y=y;this.w=w;this.h=h; }
  intersects(o) { return this.x < o.x+o.w && this.x+this.w > o.x && this.y < o.y+o.h && this.y+this.h > o.y; }
}

let player = { 
  x: 0, y: 0, w: 24, h: 46, vx: 0, vy: 0, jumps: 0, 
  intersects(o) { return this.x < o.x+(o.w||0) && this.x+this.w > o.x && this.y < o.y+(o.h||0) && this.y+this.h > o.y; },
  draw(cx,cy) { 
    // Draw Maya
    ctx.fillStyle = '#1A3C5E'; // Body
    ctx.fillRect(this.x-cx, this.y-cy+16, this.w, this.h-16);
    ctx.fillStyle = '#ffcfb3'; // Face
    ctx.fillRect(this.x-cx+4, this.y-cy, 16, 16);
    ctx.fillStyle = '#0F1A15'; // Hair
    ctx.fillRect(this.x-cx+2, this.y-cy-4, 20, 8);
    ctx.fillRect(this.x-cx+2, this.y-cy-4, 4, 16); // hair side
  }
};

let camera = { x: 0, y: 0 };
let platforms = [], hazards = [], exitObj = null;
let spawnPoint = {x:0, y:0};

function enterLevel(id) {
  state = 'LEVEL';
  lives = 3;
  canvas.style.filter = 'none'; // Clear sepia during levels
  updateHUD();
  
  // Generator 
  platforms = []; hazards = [];
  let px = 400; // Start at the end of the start base
  let lastPy = 500;
  
  // Start base
  platforms.push(new Rect(0, 600, 400, 200));
  spawnPoint = {x: 200, y: 500};
  
  // Procedural obstacle placement based on world rules
  for(let i=0; i<12; i++) {
    // Limit vertical rise/drop so jump is possible (player double jump max is ~200)
    let nextPyChange = (Math.random() * 200) - 80; // Rise up to 80, drop up to 120
    let py = Math.max(250, Math.min(650, lastPy + nextPyChange));
    lastPy = py;
    
    let pw = 120 + Math.random()*150;
    
    // Increment distance (gap between platforms)
    let gap = 80 + (id * 10) + Math.random()*60; 
    px += gap;
    
    platforms.push(new Rect(px, py, pw, 40));
    
    // Add specific world hazards
    if (i % 2 === 0 || i % 3 === 0) {
      if (id === 0) hazards.push({type: 'book', x: px+pw/2, y: -100, w: 25, h: 35, sy: py - (200 + Math.random()*200), t: Math.random()*100});
      if (id === 1) hazards.push({type: 'vine', x: px, y: py-280, w: 16, h: 280, sx: px+pw/2, t: Math.random()*10});
      if (id === 2) hazards.push({type: 'tape', x: px+pw, y: py-30, w: 40, h: 26, minx: px, maxx: px+pw});
      if (id === 3) {
          hazards.push({type: 'splash', x: px+pw/4, y: py-15, w: pw/2, h: 15});
          if (i%3===0) hazards.push({type: 'door', x: px+pw+20, y: 0, w: 30, h: 800, sy: py-150, t: Math.random()*100});
      }
      if (id === 4) hazards.push({type: 'flame', x: px+pw/2, y: py-40, w: 20, h: 30, t: Math.random()*100});
    }

    px += pw; // advance px to the end of the current platform for the next iteration
  }
  
  // End Base
  px += 300;
  platforms.push(new Rect(px, 500, 400, 300));
  exitObj = new Rect(px+180, 450, 40, 26); // Cassette 
  
  respawn();
}

function respawn() {
  player.x = spawnPoint.x; player.y = spawnPoint.y;
  player.vx = 0; player.vy = 0;
  camera.x = player.x - canvas.width/2; 
  camera.y = player.y - canvas.height/2;
}

function update() {
  if (state === 'LEVEL') {
    // 1. Physics & Movement
    player.vy += 0.5; // Gravity
    
    let moveAcc = 1.0;
    if (keys.left) player.vx -= moveAcc;
    else if (keys.right) player.vx += moveAcc;
    else player.vx *= 0.8; // Friction
    
    // Wind hazard in Garden
    if (currentWorld === 1 && player.vy !== 0) player.vx -= 0.15; 
    
    // Clamp Speed
    player.vx = Math.max(-7, Math.min(7, player.vx));
    if (player.vy > 14) player.vy = 14;
    
    // 2. X Collision
    player.x += player.vx;
    for(let p of platforms) {
      if (player.intersects(p)) {
        if (player.vx > 0) { player.x = p.x - player.w; player.vx = 0; }
        else if (player.vx < 0) { player.x = p.x + p.w; player.vx = 0; }
      }
    }
    // Handle sliding door in world 4 as a solid vertical wall
    for(let h of hazards) {
        if (h.type === 'door') {
            let doorRect = new Rect(h.x, h.y, h.w, h.h);
            if (player.intersects(doorRect)) {
                if (player.vx > 0) { player.x = doorRect.x - player.w; player.vx = 0; }
                else if (player.vx < 0) { player.x = doorRect.x + doorRect.w; player.vx = 0; }
            }
        }
    }
    
    // 3. Y Collision
    player.y += player.vy;
    let onGround = false;
    for(let p of platforms) {
      if (player.intersects(p)) {
        if (player.vy > 0) { 
            player.y = p.y - player.h; player.vy = 0; 
            onGround = true; player.jumps = 0; 
            // Update checkpoint
            spawnPoint = {x: p.x + p.w/2 - player.w/2, y: p.y - player.h - 10}; 
        }
        else if (player.vy < 0) { player.y = p.y + p.h; player.vy = 0; }
      }
    }
    
    // 4. Jumping (Double jump allowed, second smaller)
    if (keys.up) {
      if (onGround) { player.vy = -12; player.jumps = 1; }
      else if (player.jumps === 1) { player.vy = -9; player.jumps = 2; }
      keys.up = false; // require release/press
    }
    
    // 5. Bounds mapping
    if (player.y > 2000) handleDeath();
    
    // 6. Hazards update and collision
    let pRect = new Rect(player.x, player.y, player.w, player.h);
    for(let h of hazards) {
      let hRect;
      if (h.type === 'book') { 
          h.y += 5; if(h.y > h.sy + 600) h.y = h.sy - 800; 
          hRect = new Rect(h.x,h.y,h.w,h.h); 
      }
      else if (h.type === 'tape') { 
          h.x -= 3; if(h.x < h.minx) h.x = h.maxx; 
          hRect = new Rect(h.x,h.y,h.w,h.h); 
      }
      else if (h.type === 'vine') { 
          h.t += 0.04; h.x = h.sx + Math.sin(h.t)*150; 
          hRect = new Rect(h.x-10, h.y+h.h-20, 20, 20); // only base is deadly
      }
      else if (h.type === 'splash') { 
          hRect = new Rect(h.x,h.y,h.w,h.h); 
      }
      else if (h.type === 'flame') { 
          h.t += 0.2; h.h = 25 + Math.sin(h.t)*15; 
          hRect = new Rect(h.x, h.y, h.w, h.h); 
      }
      else if (h.type === 'door') {
          h.t += 0.03; h.y = h.sy + Math.sin(h.t)*200;
          // Doors are hard solids handled in X collision, but damage from top/bottom
          // actually for simplicity let's just let X collision handle them exclusively to act as blockers
      }
      
      if (hRect && pRect.intersects(hRect)) {
        if (h.type === 'splash') { 
            player.vy = -15; // Bounce upwards unpredictably
            player.jumps = 1; 
        } else {
            handleDeath();
        }
      }
    }
    
    // 7. Goal Trigger
    if (pRect.intersects(exitObj)) completeLevel();
    
    // 8. Camera Follow
    camera.x += (player.x - canvas.width/2 - camera.x) * 0.08;
    camera.y += (player.y - canvas.height/2 - camera.y) * 0.08;
  }
}

function handleDeath() {
  playHit();
  lives--; updateHUD();
  keys.left = false; keys.right = false; keys.up = false;
  if (lives <= 0) {
    state = 'DEAD';
    document.getElementById('msgTitle').innerText = "Game Over";
    document.getElementById('msgSubtitle').innerText = "You have run out of lives.";
    document.getElementById('msgBtn').innerText = "Restart";
    els.msg.classList.remove('hidden');
    nextAction = () => { 
      els.msg.classList.add('hidden'); 
      els.hud.classList.add('hidden');
      els.freqContainer.classList.add('hidden');
      els.start.classList.remove('hidden');
      document.getElementById('msgBtn').innerText = "Continue";
      unlockedWorlds = 0;
      currentWorld = 0;
      state = 'START';
      lives = 3;
    };
  } else {
    respawn();
  }
}

let nextAction = () => {};

function completeLevel() {
  state = 'WIN';
  if (currentWorld === unlockedWorlds) unlockedWorlds++;
  updateHUD();
  
  if (unlockedWorlds >= 5) {
     els.freqMeter.classList.add('pulse');
     setTimeout(triggerFinale, 1500);
     return;
  }
  
  let w = WORLDS[currentWorld];
  document.getElementById('msgTitle').innerText = "Fragment Collected";
  document.getElementById('msgSubtitle').innerText = w.text;
  
  // Play sequence
  w.audio.forEach((f, i) => { setTimeout(()=>playTone(f, 0.4), i*350); });
  
  els.msg.classList.remove('hidden');
  nextAction = () => { 
      els.msg.classList.add('hidden'); 
      els.freqMeter.classList.add('pulse'); 
      setTimeout(enterMap, 800); 
  };
}

function triggerFinale() {
  state = 'FINALE';
  els.hud.classList.add('hidden');
  els.freqContainer.classList.add('hidden');
  els.finale.classList.remove('hidden');
  
  canvas.style.filter = 'none'; // Fully remove sepia
  
  // Fade text lines incrementally
  document.getElementById('finText1').style.opacity = 1;
  document.getElementById('finText2').style.opacity = 1;
  document.getElementById('finText3').style.opacity = 1;
  document.getElementById('replayBtn').style.opacity = 1;
  
  // Play full song recursively to piece all fragments
  let allNotes = [];
  WORLDS.forEach(w => allNotes = allNotes.concat(w.audio));
  allNotes.forEach((f, i) => { 
      let isLast = i === allNotes.length - 1;
      setTimeout(() => playTone(f, isLast ? 3.0 : 0.4), i * 350); 
  });
}

function draw() {
  if (state === 'START' || state === 'FINALE') {
      ctx.clearRect(0,0,canvas.width, canvas.height);
      return;
  }
  
  if (state === 'MAP') {
    ctx.fillStyle = '#E3D8C8'; // Base map color, filter applies sepia
    ctx.fillRect(0,0,canvas.width, canvas.height);
    
    // Draw Map Path
    ctx.beginPath();
    ctx.moveTo(MAP_NODES[0].x, MAP_NODES[0].y);
    for(let i=1; i<5; i++) ctx.lineTo(MAP_NODES[i].x, MAP_NODES[i].y);
    ctx.strokeStyle = '#6B6B6B'; ctx.lineWidth = 8; ctx.stroke();
    
    // Draw Nodes
    for(let i=0; i<5; i++) {
      let n = MAP_NODES[i];
      ctx.beginPath(); 
      ctx.arc(n.x, n.y, 40, 0, Math.PI*2);
      
      if (i < unlockedWorlds) {
        ctx.fillStyle = '#9B7B2C'; ctx.fill();  // Completed
        ctx.fillStyle = '#FFF';
        ctx.fillRect(n.x-10, n.y-8, 20, 16); // small cassette shape
      } 
      else if (i === unlockedWorlds) {
        ctx.fillStyle = '#F5F5F0'; ctx.fill(); // Current Target
        ctx.strokeStyle = '#9B7B2C'; ctx.lineWidth = 6; ctx.stroke();
      } 
      else {
        ctx.fillStyle = '#6B6B6B'; ctx.fill(); // Locked
      }
      
      // Node Labels
      ctx.fillStyle = '#141414'; 
      ctx.font = 'bold 22px sans-serif'; 
      ctx.textAlign = "center";
      ctx.fillText(n.name, n.x, n.y + 70);
    }
    
    // Draw Maya at current location
    let cur = MAP_NODES[Math.min(unlockedWorlds, 4)];
    
    // Give Maya a glowing border if resting on target
    if (state === 'MAP') {
        ctx.strokeStyle = 'rgba(155, 123, 44, 0.5)';
        ctx.lineWidth = 10;
        ctx.beginPath();
        ctx.arc(cur.x, cur.y, 50 + Math.sin(performance.now()*0.005)*5, 0, Math.PI*2);
        ctx.stroke();
    }
    
    // Simplified Map Maya
    ctx.fillStyle = '#1A3C5E'; 
    ctx.fillRect(cur.x-15, cur.y-35, 30, 40);
    ctx.fillStyle = '#ffcfb3'; 
    ctx.fillRect(cur.x-8, cur.y-45, 16, 16);
    
  } 
  else if (state === 'LEVEL') {
    ctx.fillStyle = WORLDS[currentWorld].bg;
    ctx.fillRect(0,0,canvas.width, canvas.height);
    
    // Environmental FX: Rain for Studio Street
    if (currentWorld === 3) {
       ctx.fillStyle = 'rgba(150, 200, 255, 0.2)';
       for(let i=0; i<150; i++) {
           let rx = (i * 25) % canvas.width;
           let ry = (performance.now()*0.6 + i*15) % canvas.height;
           ctx.fillRect(rx, ry, 2, 20);
       }
    }
    
    let cx = camera.x, cy = camera.y;
    
    // Draw Platforms
    let pfTheme = ['#5e4533', '#2d4c2a', '#4c3928', '#2b334d', '#4d2a33'][currentWorld];
    ctx.fillStyle = pfTheme;
    for(let p of platforms) ctx.fillRect(p.x-cx, p.y-cy, p.w, p.h);
    
    // Draw Hazards
    for(let h of hazards) {
      if (h.type === 'vine') {
        ctx.strokeStyle = '#443322'; ctx.lineWidth = 6; 
        ctx.beginPath(); ctx.moveTo(h.sx-cx, h.y-cy); ctx.lineTo(h.x-cx, h.y+h.h-cy); ctx.stroke();
        ctx.fillStyle = '#1e381b'; ctx.beginPath(); ctx.arc(h.x-cx, h.y+h.h-cy, 20, 0, Math.PI*2); ctx.fill();
      } 
      else if (h.type === 'splash') {
        ctx.fillStyle = 'rgba(80, 150, 250, 0.5)'; 
        ctx.fillRect(h.x-cx, h.y-cy, h.w, h.h);
      } 
      else if (h.type === 'door') {
        ctx.fillStyle = '#8899aa'; 
        ctx.fillRect(h.x-cx, h.y-cy, h.w, h.h);
      }
      else if (h.type === 'flame') {
        ctx.fillStyle = '#ff9900'; 
        ctx.beginPath(); ctx.moveTo(h.x+h.w/2-cx, h.y-cy); 
        ctx.lineTo(h.x+h.w-cx, h.y+h.h-cy); ctx.lineTo(h.x-cx, h.y+h.h-cy); ctx.fill();
      } 
      else {
        // Books, Tapes
        ctx.fillStyle = '#9e3b33'; 
        ctx.fillRect(h.x-cx, h.y-cy, h.w, h.h);
      }
    }
    
    // Draw Exit Cassette
    ctx.fillStyle = '#9B7B2C';
    ctx.fillRect(exitObj.x-cx, exitObj.y-cy, exitObj.w, exitObj.h);
    ctx.fillStyle = '#fff';
    ctx.fillRect(exitObj.x+8-cx, exitObj.y+6-cy, exitObj.w-16, exitObj.h-12);
    
    // Draw Player
    player.draw(cx, cy);
  }
}

// Game Loop
function loop() { 
    update(); 
    draw(); 
    requestAnimationFrame(loop); 
}

requestAnimationFrame(loop);

</script>
